<div class="vcite-panel" id="panel-{id}">
  <div class="vcite-panel-label">Verified citation &mdash; {author_label}</div>
  <div class="vcite-passage"><span class="ctx">{text_before}</span>{text_exact}<span class="ctx">{text_after}</span></div>
  <div class="vcite-meta-row">
    <span><span class="vcite-relation">{relation}</span></span>
    <span class="vcite-hash">{hash_display}</span>
  </div>
  <a class="vcite-link" href="{verify_url}" target="_blank" rel="noopener">Verify in source &#x2197;</a>
</div>
